const names = Object.keys(LAYERS);

// Build series
const series = names.map((name, i) => ({
  name,
  type: 'line',
  data: LAYERS[name].map(([d, e]) => [d, e]),
  smooth: true,
  symbol: 'none',
  lineStyle: { color: COLORS[i], width: 2 },
  itemStyle: { color: COLORS[i] },
  emphasis: { focus: 'series' }
}));

const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });

const option = {
  backgroundColor: 'transparent',
  grid: { top: 24, right: 28, bottom: 80, left: 68 },
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'cross', label: { backgroundColor: '#f6f8fa' } },
    backgroundColor: '#ffffff',
    borderColor: '#d0d7de',
    borderWidth: 1,
    textStyle: { color: '#1f2328', fontFamily: 'Inconsolata, monospace', fontSize: 12 },
    formatter: params => {
      const dist = (params[0].data[0] / 1000).toFixed(2);
      let html = `<div style="margin-bottom:6px;color:#636c76;font-size:11px">📍 ${dist} km</div>`;
      params.forEach(p => {
        html += `<div style="display:flex;align-items:center;gap:8px;margin:3px 0">
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color}"></span>
          <span style="color:#636c76">${p.seriesName}</span>
          <span style="margin-left:auto;font-weight:600;color:#1f2328">${p.data[1].toFixed(1)} m</span>
        </div>`;
      });
      return html;
    }
  },
  xAxis: {
    type: 'value',
    min: 0,
    axisLabel: {
      color: '#636c76',
      fontFamily: 'Inconsolata, monospace',
      fontSize: 11,
      formatter: v => (v / 1000).toFixed(0) + ' km'
    },
    splitLine: { lineStyle: { color: '#d0d7de', type: 'dashed' } },
    axisLine: { lineStyle: { color: '#d0d7de' } }
  },
  yAxis: {
    type: 'value',
    axisLabel: {
      color: '#636c76',
      fontFamily: 'Inconsolata, monospace',
      fontSize: 11,
      formatter: v => v + ' m'
    },
    splitLine: { lineStyle: { color: '#d0d7de', type: 'dashed' } },
    axisLine: { lineStyle: { color: '#d0d7de' } }
  },
  dataZoom: [
    {
      type: 'inside',
      xAxisIndex: 0,
      filterMode: 'none'
    },
    {
      type: 'slider',
      xAxisIndex: 0,
      bottom: 4,
      height: 28,
      backgroundColor: '#f6f8fa',
      borderColor: '#d0d7de',
      fillerColor: 'rgba(50,136,189,0.12)',
      handleStyle: { color: '#3288bd', borderColor: '#3288bd' },
      textStyle: { color: '#636c76', fontFamily: 'Inconsolata, monospace', fontSize: 10 },
      labelFormatter: v => (v / 1000).toFixed(1) + ' km'
    }
  ],
  legend: { show: false },
  series
};

chart.setOption(option);
window.addEventListener('resize', () => chart.resize());

// Custom legend with toggle
const legendEl = document.getElementById('legend');
const visibility = {};
names.forEach((name, i) => {
  visibility[name] = true;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `
    <div class="legend-dot" style="background:${COLORS[i]}"></div>
    <span class="legend-name">${name}</span>
  `;
  item.addEventListener('click', () => {
    visibility[name] = !visibility[name];
    item.style.opacity = visibility[name] ? '1' : '0.35';
    chart.dispatchAction({
      type: visibility[name] ? 'legendSelect' : 'legendUnSelect',
      name
    });
  });
  legendEl.appendChild(item);
});
</script>
