<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Shared Views</title>
        <link rel="stylesheet" href="/node_modules/ol/ol.css" />
        <style>
            .map {
                width: 100%;
                height: 400px;
            }

            @media (min-width: 800px) {
                .wrapper {
                    display: flex;
                }

                .half {
                    padding: 0 10px;
                    width: 50%;
                    float: left;
                }
            }
        </style>
    </head>

    <body>
        <div class="wrapper">
            <div class="half">
                <select id="layerSelect1">
                    <option value="osm">OSM</option>
                    <option value="dop">DOP</option>
                    <option value="opentopomap">OpenTopoMap</option>
                    <option value="dopCir">DOP CIR</option>
                    <option value="cyclOsm">cyclOSM</option>
                    <option value="outdoor">Outdoor</option>
                </select>
                <div id="map1" class="map"></div>
            </div>
            <div class="half">
                <select id="layerSelect2">
                    <option value="osm">OSM</option>
                    <option value="dop">DOP</option>
                    <option value="opentopomap" selected>OpenTopoMap</option>
                    <option value="dopCir">DOP CIR</option>
                    <option value="cyclOsm">cyclOSM</option>
                    <option value="outdoor">Outdoor</option>
                </select>
                <div id="map2" class="map"></div>
            </div>
        </div>

        <script type="module" src="./map.js"></script>
    </body>
</html>
